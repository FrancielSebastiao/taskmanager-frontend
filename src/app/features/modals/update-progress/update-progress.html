<h2 mat-dialog-title>Atualizar Progresso</h2>

    <mat-dialog-content>
      <div class="progress-display">
        <span class="progress-value">{{ progress }}%</span>
        <span class="progress-hint">Arraste para ajustar</span>
      </div>

      <mat-slider min="0" max="100" step="5" class="full-width">
        <input matSliderThumb [(ngModel)]="progress" />
      </mat-slider>

      <div class="progress-track">
        <span>0%</span>
        <span>50%</span>
        <span>100%</span>
      </div>

      <mat-progress-bar
        mode="determinate"
        [value]="progress"
        [color]="barColor"
        class="preview-bar"
      ></mat-progress-bar>
      <p class="preview-label">Pré-visualização</p>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
      <button mat-button (click)="cancel()">Cancelar</button>
      <button mat-flat-button color="primary" (click)="submit()" [disabled]="loading">
        <mat-spinner *ngIf="loading" diameter="18"></mat-spinner>
        <span *ngIf="!loading">Atualizar</span>
      </button>
    </mat-dialog-actions>
