<mat-nav-list>

  <a mat-list-item matTooltip="Dashboard"
    routerLink="/dashboard" routerLinkActive="active">
    <mat-icon matListItemIcon>dashboard</mat-icon>
    <span class="label" matListItemTitle [class.hidden]="collapsed">Painel Principal</span>
  </a>

  <a mat-list-item matTooltip="Tasks"
    routerLink="/tasks" routerLinkActive="active">
    <mat-icon matListItemIcon>task</mat-icon>
    <span matListItemTitle *ngIf="!collapsed">Minhas Tarefas</span>
  </a>

  <a mat-list-item matTooltip="Projects"
    routerLink="/projects" routerLinkActive="active">
    <mat-icon matListItemIcon>folder</mat-icon>
    <span matListItemTitle *ngIf="!collapsed">Projectos</span>
  </a>

  <a mat-list-item matTooltip="Calendar"
    routerLink="/calendar" routerLinkActive="active">
    <mat-icon matListItemIcon>calendar_today</mat-icon>
    <span matListItemTitle *ngIf="!collapsed">Calendário</span>
  </a>

  <a mat-list-item matTooltip="Análise e Relatórios"
    routerLink="/reports" routerLinkActive="active">
    <mat-icon matListItemIcon>assessment</mat-icon>
    <span matListItemTitle *ngIf="!collapsed">Análise e Relatórios</span>
  </a>

  <span class="spacer"></span>

  <a mat-list-item matTooltip="Settings"
    routerLink="/settings" routerLinkActive="active">
    <mat-icon matListItemIcon>settings</mat-icon>
    <span matListItemTitle *ngIf="!collapsed">Configurações</span>
  </a>

  <a mat-list-item 
    matTooltip="Logout" 
    *ngIf="authService.isAuthenticated$ | async"
    href="#"
    (click)="logout(); $event.preventDefault()" 
    class="logout-link">
    <mat-icon matListItemIcon>logout</mat-icon>
    <span matListItemTitle class="logout-label" *ngIf="!collapsed">Logout</span>
  </a>

</mat-nav-list>
