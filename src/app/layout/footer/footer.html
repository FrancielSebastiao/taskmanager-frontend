<footer class="landing-footer">
  <div class="footer-inner">

    <div class="footer-grid">

      <!-- Brand column -->
      <div class="footer-brand">
        <div class="footer-logo">
          <div class="footer-logo__icon">
            <mat-icon>folder_special</mat-icon>
          </div>
          <span class="footer-logo__text">TaskFlow</span>
        </div>
        <p class="footer-brand__desc">
          Gestão de projetos moderna e eficiente para equipes de todos os tamanhos.
        </p>
      </div>

      <!-- Link columns -->
      <div class="footer-col" *ngFor="let col of footerColumns">
        <h4 class="footer-col__title">{{ col.title }}</h4>
        <ul class="footer-col__list">
          <li *ngFor="let link of col.links">
            <a href="#" class="footer-link">{{ link }}</a>
          </li>
        </ul>
      </div>

    </div>

    <!-- Bottom bar -->
    <div class="footer-bottom">
      <p>© {{ currentYear }} TaskFlow. Todos os direitos reservados.</p>
    </div>

  </div>
</footer>
